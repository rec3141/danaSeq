site_name: "d\u0101naSeq"
site_description: Real-time and post-expedition metagenomic analysis for ocean sequencing
site_url: https://rec3141.github.io/danaSeq/
repo_url: https://github.com/rec3141/danaSeq
repo_name: rec3141/danaSeq

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

nav:
  - Home: index.md
  - Nanopore Live: nanopore-live.md
  - Nanopore Assembly: nanopore-assembly.md
  - Illumina Assembly: illumina-assembly.md
  - MAG Analysis: mag-analysis.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
